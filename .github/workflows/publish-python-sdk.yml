name: Publish Python SDK

on:
  push:
    tags:
      - 'pylva-py-v*'

permissions:
  contents: read

jobs:
  publish-python:
    name: Publish pylva
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      actions: read
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Verify release tag is on main
        id: release_commit
        run: |
          git fetch --no-tags origin main:refs/remotes/origin/main
          TAG_COMMIT="$(git rev-parse "${GITHUB_SHA}^{commit}")"
          if ! git merge-base --is-ancestor "$TAG_COMMIT" origin/main; then
            echo "::error::Release tags must point at commits already merged to origin/main"
            exit 1
          fi
          echo "sha=$TAG_COMMIT" >> "$GITHUB_OUTPUT"

      - name: Require every release gate for the exact release commit
        id: release_gates
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_SHA: ${{ steps.release_commit.outputs.sha }}
        run: node scripts/ci/attest-release-sha.mjs

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Verify release metadata
        env:
          # Pass the ref name via env and read it at runtime instead of
          # interpolating ${{ github.ref_name }} into the Python source (a tag
          # name can contain quotes and break out of the string literal).
          REF_NAME: ${{ github.ref_name }}
        run: |
          python - <<'PY'
          import os
          import pathlib
          import tomllib

          pyproject = tomllib.loads(pathlib.Path("packages/sdk-py/pyproject.toml").read_text())
          project_name = pyproject["project"]["name"]
          version = pyproject["project"]["version"]
          expected_tag = f"pylva-py-v{version}"
          ref_name = os.environ["REF_NAME"]
          assert project_name == "pylva-sdk"
          assert pyproject["tool"]["hatch"]["build"]["targets"]["wheel"]["packages"] == ["pylva"]
          assert ref_name == expected_tag, (
              f"tag {ref_name} does not match Python SDK version {version}"
          )
          PY

      - name: Download the exact attested Python release artifacts
        uses: actions/download-artifact@v8
        with:
          name: pylva-python-sdk-immutable
          path: ${{ runner.temp }}/pylva-python-release
          github-token: ${{ github.token }}
          run-id: ${{ steps.release_gates.outputs.authoritative_run_id }}

      - name: Derive exact artifact identities and hashes
        id: artifacts
        env:
          RELEASE_SHA: ${{ steps.release_commit.outputs.sha }}
        run: |
          python - <<'PY'
          import hashlib
          import json
          import os
          import pathlib
          import shutil
          import tarfile
          import tomllib
          import zipfile
          from email.parser import Parser

          pyproject = tomllib.loads(pathlib.Path("packages/sdk-py/pyproject.toml").read_text())
          project_name = pyproject["project"]["name"]
          version = pyproject["project"]["version"]
          download = pathlib.Path(os.environ["RUNNER_TEMP"]) / "pylva-python-release"
          files = sorted(path for path in download.iterdir() if path.is_file())
          wheels = [path for path in files if path.suffix == ".whl"]
          sdists = [path for path in files if path.name.endswith(".tar.gz")]
          metadata_files = [path for path in files if path.name == "metadata.json"]
          assert len(files) == 3 and len(wheels) == len(sdists) == len(metadata_files) == 1, [
              path.name for path in files
          ]
          attestation = json.loads(metadata_files[0].read_text())
          assert set(attestation) == {
              "name", "version", "source_sha", "wheel", "wheel_sha256",
              "sdist", "sdist_sha256",
          }
          assert attestation["name"] == project_name
          assert attestation["version"] == version
          assert attestation["source_sha"] == os.environ["RELEASE_SHA"]
          assert wheels[0].name == attestation["wheel"]
          assert sdists[0].name == attestation["sdist"]

          with zipfile.ZipFile(wheels[0]) as archive:
              metadata_names = [
                  name for name in archive.namelist() if name.endswith(".dist-info/METADATA")
              ]
              assert len(metadata_names) == 1, metadata_names
              wheel_metadata = Parser().parsestr(archive.read(metadata_names[0]).decode())
          with tarfile.open(sdists[0], mode="r:gz") as archive:
              metadata_members = [
                  member
                  for member in archive.getmembers()
                  if member.isfile()
                  and member.name.count("/") == 1
                  and member.name.endswith("/PKG-INFO")
              ]
              assert len(metadata_members) == 1, [member.name for member in metadata_members]
              metadata_file = archive.extractfile(metadata_members[0])
              assert metadata_file is not None
              sdist_metadata = Parser().parsestr(metadata_file.read().decode())

          for artifact_metadata in (wheel_metadata, sdist_metadata):
              assert artifact_metadata["Name"] == project_name
              assert artifact_metadata["Version"] == version

          def sha256(path):
              digest = hashlib.sha256()
              with path.open("rb") as artifact:
                  for chunk in iter(lambda: artifact.read(1024 * 1024), b""):
                      digest.update(chunk)
              return digest.hexdigest()

          assert sha256(wheels[0]) == attestation["wheel_sha256"]
          assert sha256(sdists[0]) == attestation["sdist_sha256"]
          dist = pathlib.Path("packages/sdk-py/dist")
          assert not dist.exists() or not any(dist.iterdir())
          dist.mkdir(parents=True, exist_ok=True)
          wheel = pathlib.Path(shutil.copy2(wheels[0], dist / wheels[0].name)).resolve()
          sdist = pathlib.Path(shutil.copy2(sdists[0], dist / sdists[0].name)).resolve()

          outputs = {
              "name": project_name,
              "version": version,
              "wheel": str(wheel),
              "sdist": str(sdist),
              "wheel_sha256": sha256(wheel),
              "sdist_sha256": sha256(sdist),
          }
          with pathlib.Path(os.environ["GITHUB_OUTPUT"]).open("a") as output:
              for key, value in outputs.items():
                  assert "\n" not in value and "\r" not in value
                  output.write(f"{key}={value}\n")
          print(
              f"Attested {project_name}@{version}: "
              f"{wheel.name} ({outputs['wheel_sha256']}), "
              f"{sdist.name} ({outputs['sdist_sha256']})"
          )
          PY

      - name: Inspect and clean-install both immutable artifacts
        run: >-
          python scripts/ci/smoke-python-package.py packages/sdk-py
          --verify-existing
          --wheel '${{ steps.artifacts.outputs.wheel }}'
          --sdist '${{ steps.artifacts.outputs.sdist }}'
          --wheel-sha256 '${{ steps.artifacts.outputs.wheel_sha256 }}'
          --sdist-sha256 '${{ steps.artifacts.outputs.sdist_sha256 }}'

      - name: Re-verify exact bytes immediately before publication
        run: |
          set -euo pipefail
          test "$(sha256sum '${{ steps.artifacts.outputs.wheel }}' | cut -d' ' -f1)" = '${{ steps.artifacts.outputs.wheel_sha256 }}'
          test "$(sha256sum '${{ steps.artifacts.outputs.sdist }}' | cut -d' ' -f1)" = '${{ steps.artifacts.outputs.sdist_sha256 }}'

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247 # release/v1
        with:
          packages-dir: packages/sdk-py/dist
