name: Authoritative Budget Control CI

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review, labeled]
    paths:
      - '.github/workflows/**'
      - '.env.example'
      - 'Dockerfile'
      - 'docker-*.sh'
      - 'db/clickhouse/**'
      - 'db/clickhouse-statements.ts'
      - 'db/migration-phases.json'
      - 'db/migrations/**'
      - 'db/seed.ts'
      - 'db/seeds/**'
      - 'db/setup.ts'
      - 'package.json'
      - 'packages/sdk-py/**'
      - 'packages/sdk-ts/**'
      - 'packages/shared/**'
      - 'playwright.config.ts'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'scripts/**'
      - 'src/app/api/**'
      - 'src/app/o/**/dashboard/**'
      - 'src/app/portal/**'
      - 'src/components/**'
      - 'src/instrumentation.node.ts'
      - 'src/lib/**'
      - 'src/middleware.ts'
      - 'tests/**'
      - 'tsconfig*.json'
      - 'vitest*.ts'
  push:
    branches: [main]
  schedule:
    - cron: '11 3 * * *'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DATABASE_URL: postgresql://pylva_app_ci:pylva_app_ci_test@localhost:5432/pylva_test
  BUDGET_CONTROL_DATABASE_URL: postgresql://pylva_budget_control_ci:pylva_budget_control_ci_test@localhost:5432/pylva_test
  ALLOW_BUDGET_CONTROL_DATABASE_URL_FALLBACK: 'false'
  CLICKHOUSE_URL: http://default:test@localhost:8123
  BUDGET_PROJECTION_CLICKHOUSE_URL: http://default:test@localhost:8123
  ALLOW_BUDGET_PROJECTION_CLICKHOUSE_URL_FALLBACK: 'true'
  REDIS_URL: redis://localhost:6379
  JWT_PRIVATE_KEY: /tmp/pylva-authoritative-ci-private.pem
  JWT_PUBLIC_KEY: /tmp/pylva-authoritative-ci-public.pem
  ARGON2_SECRET: authoritative-ci-test-secret-32-bytes!!
  STRIPE_WEBHOOK_SECRET: whsec_authoritative_ci_test
  CRON_SECRET: 'authoritative-ci-cron-secret-32-bytes'
  ENABLE_AUTHORITATIVE_BUDGET_CONTROL: 'false'
  NODE_ENV: test

jobs:
  contract-parity:
    name: Shared wire-contract parity
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@v7
        with:
          node-version: 20.19.0
          cache: pnpm

      - uses: actions/setup-python@v7
        with:
          python-version: '3.10'
          cache: pip
          cache-dependency-path: packages/sdk-py/pyproject.toml

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Python contract dependencies
        run: python -m pip install --disable-pip-version-check -e 'packages/sdk-py[dev]'

      - name: Validate backend and shared schema corpus
        run: >-
          pnpm exec vitest run
          tests/contracts/budget-control-contract.test.ts
          tests/contracts/budget-control-schema-hardening.test.ts
          tests/db/authoritative-budget-ledger-schema.test.ts
          tests/db/authoritative-budget-legacy-rls-compatibility-schema.test.ts
          tests/db/authoritative-budget-projection-schema.test.ts
          tests/db/authoritative-budget-runtime-schema.test.ts
          tests/db/general-app-runtime-owner-boundary-schema.test.ts
          tests/db/general-app-runtime-posture.test.ts
          tests/db/migration-manifest-sync.test.ts

      - name: Validate credential, role-posture, and container boundaries
        run: >-
          pnpm exec vitest run
          tests/budget-control/database-config.test.ts
          tests/budget-control/credentials.test.ts
          tests/budget-control/runtime-posture.test.ts
          tests/infrastructure/budget-control-client-boundary.test.ts
          tests/infrastructure/database-credential-separation.test.ts
          tests/infrastructure/dockerfile-migrations.test.ts
          tests/infrastructure/authoritative-budget-ci-topology.test.ts
          tests/infrastructure/typescript-immutable-integration-artifact.test.ts
          tests/infrastructure/authoritative-budget-e2e-seed-boundary.test.ts
          tests/infrastructure/authoritative-budget-migration-role-bootstrap.test.ts
          tests/helpers/scratch-db.test.ts
          tests/budget-projection/clickhouse-config.test.ts
          tests/budget-projection/clickhouse-rbac.test.ts
          tests/budget-projection/clickhouse-default-client.test.ts
          tests/budget-projection/clickhouse-posture.test.ts
          tests/runtime/bootstrap.test.ts
          tests/scripts/migration-database-env.test.ts
          tests/scripts/apply-postgres-migration-env.test.ts
          tests/scripts/provision-authoritative-budget-runtime-role-contract.test.ts
          tests/scripts/provision-general-app-runtime-role-contract.test.ts
          tests/scripts/verify-physical-schema-contract.test.ts

      - name: Replay corpus through TypeScript SDK
        run: >-
          pnpm --filter @pylva/sdk exec vitest run
          tests/budget_control_contract.test.ts

      - name: Replay corpus through Python SDK
        run: python -m pytest packages/sdk-py/tests/test_budget_control_contract.py

  typescript-package-artifact:
    name: TypeScript SDK / immutable artifact
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@v7
        with:
          node-version: '24.18.0'
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build shared type references
        run: pnpm exec tsc -b packages/shared/tsconfig.json --force

      - name: Typecheck, build, and size-check TypeScript SDK
        run: |
          pnpm --filter @pylva/sdk typecheck
          pnpm --filter @pylva/sdk build
          pnpm --filter @pylva/sdk size

      - name: Pack, inspect, and fingerprint one immutable artifact
        run: |
          set -euo pipefail
          ARTIFACT_DIR="$RUNNER_TEMP/pylva-typescript-artifact"
          node scripts/ci/smoke-typescript-package.mjs \
            --artifact-only \
            --pack-output "$ARTIFACT_DIR" \
            --metadata-output "$ARTIFACT_DIR/metadata.json"

      - name: Upload immutable TypeScript artifact
        uses: actions/upload-artifact@v7
        with:
          name: pylva-typescript-sdk-immutable
          path: ${{ runner.temp }}/pylva-typescript-artifact/*
          if-no-files-found: error
          retention-days: 30

  typescript-package-matrix:
    name: TypeScript SDK source + immutable artifact / Node ${{ matrix.node }}
    needs: typescript-package-artifact
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        node: ['20.18.1', '22.23.1', '24.18.0']
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@v7
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Test TypeScript SDK
        run: pnpm --filter @pylva/sdk test

      - name: Build shared type references
        run: pnpm exec tsc -b packages/shared/tsconfig.json --force

      - name: Typecheck TypeScript SDK
        run: pnpm --filter @pylva/sdk typecheck

      - name: Download the one immutable npm artifact
        uses: actions/download-artifact@v8
        with:
          name: pylva-typescript-sdk-immutable
          path: ${{ runner.temp }}/pylva-typescript-download

      - name: Verify downloaded artifact identity
        run: |
          set -euo pipefail
          DOWNLOAD="$RUNNER_TEMP/pylva-typescript-download"
          METADATA="$DOWNLOAD/metadata.json"
          mapfile -t TARBALLS < <(find "$DOWNLOAD" -type f -name '*.tgz' -print)
          test "${#TARBALLS[@]}" -eq 1
          TARBALL="$(node -e "const p=require('node:path'),m=require(process.argv[1]);process.stdout.write(p.resolve(p.dirname(process.argv[1]),m.tarball))" "$METADATA")"
          test "$(realpath "${TARBALLS[0]}")" = "$(realpath "$TARBALL")"
          SHA256="$(node -e "const m=require(process.argv[1]);process.stdout.write(m.sha256)" "$METADATA")"
          node scripts/ci/smoke-typescript-package.mjs \
            --tarball "$TARBALL" \
            --expected-sha256 "$SHA256" \
            --artifact-only
          echo "PYLVA_TYPESCRIPT_TARBALL=$TARBALL" >> "$GITHUB_ENV"
          echo "PYLVA_TYPESCRIPT_TARBALL_SHA256=$SHA256" >> "$GITHUB_ENV"

      - name: Verify optional-peer-free installed artifact
        run: >-
          node scripts/ci/smoke-typescript-package.mjs
          --tarball "$PYLVA_TYPESCRIPT_TARBALL"
          --expected-sha256 "$PYLVA_TYPESCRIPT_TARBALL_SHA256"
          --optional-peer-free

      - name: Verify strict-supported peer floors from the same artifact
        run: >-
          node scripts/ci/smoke-typescript-package.mjs
          --tarball "$PYLVA_TYPESCRIPT_TARBALL"
          --expected-sha256 "$PYLVA_TYPESCRIPT_TARBALL_SHA256"
          --peer-set scripts/ci/typescript-package-peers-floor.json
          --profile full

      - name: Verify repository-current peers from the same artifact
        run: >-
          node scripts/ci/smoke-typescript-package.mjs
          --tarball "$PYLVA_TYPESCRIPT_TARBALL"
          --expected-sha256 "$PYLVA_TYPESCRIPT_TARBALL_SHA256"
          --peer-set scripts/ci/typescript-package-peers-current.json
          --profile full

      - name: Verify actual AI SDK 3 refusal from the same artifact
        run: >-
          node scripts/ci/smoke-typescript-package.mjs
          --tarball "$PYLVA_TYPESCRIPT_TARBALL"
          --expected-sha256 "$PYLVA_TYPESCRIPT_TARBALL_SHA256"
          --peer-set scripts/ci/typescript-package-peers-ai3.json
          --profile vercel-refuse

      - name: Verify actual AI SDK 4 refusal from the same artifact
        run: >-
          node scripts/ci/smoke-typescript-package.mjs
          --tarball "$PYLVA_TYPESCRIPT_TARBALL"
          --expected-sha256 "$PYLVA_TYPESCRIPT_TARBALL_SHA256"
          --peer-set scripts/ci/typescript-package-peers-ai4.json
          --profile vercel-refuse

      - name: Verify actual AI SDK 5 refusal from the same artifact
        run: >-
          node scripts/ci/smoke-typescript-package.mjs
          --tarball "$PYLVA_TYPESCRIPT_TARBALL"
          --expected-sha256 "$PYLVA_TYPESCRIPT_TARBALL_SHA256"
          --peer-set scripts/ci/typescript-package-peers-ai5.json
          --profile vercel-refuse

      - name: Re-verify the immutable TypeScript artifact after use
        if: always()
        run: |
          set -euo pipefail
          test -f "${PYLVA_TYPESCRIPT_TARBALL:-}"
          test "${PYLVA_TYPESCRIPT_TARBALL_SHA256:-}" != ''
          ACTUAL_SHA256="$(node -e "const fs=require('node:fs'),c=require('node:crypto');process.stdout.write(c.createHash('sha256').update(fs.readFileSync(process.argv[1])).digest('hex'))" "$PYLVA_TYPESCRIPT_TARBALL")"
          test "$ACTUAL_SHA256" = "$PYLVA_TYPESCRIPT_TARBALL_SHA256"

  python-package-artifact:
    name: Python SDK / immutable artifact
    runs-on: ubuntu-latest
    timeout-minutes: 25
    outputs:
      wheel: ${{ steps.fingerprint.outputs.wheel }}
      wheel_sha256: ${{ steps.fingerprint.outputs.wheel_sha256 }}
      sdist: ${{ steps.fingerprint.outputs.sdist }}
      sdist_sha256: ${{ steps.fingerprint.outputs.sdist_sha256 }}
      name: ${{ steps.fingerprint.outputs.name }}
      version: ${{ steps.fingerprint.outputs.version }}
      source_sha: ${{ steps.fingerprint.outputs.source_sha }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v7
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: packages/sdk-py/pyproject.toml

      - name: Build and fingerprint one immutable Python artifact pair
        id: fingerprint
        run: |
          set -euo pipefail
          python -m pip install --disable-pip-version-check build
          ARTIFACT_DIR="$RUNNER_TEMP/pylva-python-artifact"
          mkdir -p "$ARTIFACT_DIR"
          python -m build --outdir "$ARTIFACT_DIR" packages/sdk-py
          PYLVA_PYTHON_ARTIFACT_DIR="$ARTIFACT_DIR" python - <<'PY'
          import hashlib
          import json
          import os
          import pathlib
          import re
          import tomllib

          artifact_dir = pathlib.Path(os.environ["PYLVA_PYTHON_ARTIFACT_DIR"])
          wheels = sorted(artifact_dir.glob("*.whl"))
          sdists = sorted(artifact_dir.glob("*.tar.gz"))
          if len(wheels) != 1 or len(sdists) != 1:
              raise SystemExit(f"expected one wheel and one sdist, found {wheels + sdists}")
          project = tomllib.loads(pathlib.Path("packages/sdk-py/pyproject.toml").read_text())["project"]
          source_sha = os.environ["GITHUB_SHA"]
          if re.fullmatch(r"[0-9a-f]{40}", source_sha) is None:
              raise SystemExit("GITHUB_SHA must be one full lowercase commit SHA")

          def digest(path: pathlib.Path) -> str:
              return hashlib.sha256(path.read_bytes()).hexdigest()

          metadata = {
              "name": project["name"],
              "version": project["version"],
              "source_sha": source_sha,
              "wheel": wheels[0].name,
              "wheel_sha256": digest(wheels[0]),
              "sdist": sdists[0].name,
              "sdist_sha256": digest(sdists[0]),
          }
          (artifact_dir / "metadata.json").write_text(
              json.dumps(metadata, indent=2, sort_keys=True) + "\n"
          )
          with pathlib.Path(os.environ["GITHUB_OUTPUT"]).open("a") as output:
              for key, value in metadata.items():
                  if not isinstance(value, str) or "\n" in value or "\r" in value:
                      raise SystemExit(f"unsafe artifact output: {key}")
                  output.write(f"{key}={value}\n")
          PY

      - name: Inspect and clean-install the immutable Python artifact pair
        run: |
          set -euo pipefail
          ARTIFACT_DIR="$RUNNER_TEMP/pylva-python-artifact"
          WHEEL="$(python -c 'import json,pathlib,sys; p=pathlib.Path(sys.argv[1]); print(p.parent / json.loads(p.read_text())["wheel"])' "$ARTIFACT_DIR/metadata.json")"
          SDIST="$(python -c 'import json,pathlib,sys; p=pathlib.Path(sys.argv[1]); print(p.parent / json.loads(p.read_text())["sdist"])' "$ARTIFACT_DIR/metadata.json")"
          WHEEL_SHA256="$(python -c 'import json,sys; print(json.load(open(sys.argv[1]))["wheel_sha256"])' "$ARTIFACT_DIR/metadata.json")"
          SDIST_SHA256="$(python -c 'import json,sys; print(json.load(open(sys.argv[1]))["sdist_sha256"])' "$ARTIFACT_DIR/metadata.json")"
          python scripts/ci/smoke-python-package.py --verify-existing \
            --wheel "$WHEEL" \
            --sdist "$SDIST" \
            --wheel-sha256 "$WHEEL_SHA256" \
            --sdist-sha256 "$SDIST_SHA256"

      - name: Upload immutable Python artifacts
        uses: actions/upload-artifact@v7
        with:
          name: pylva-python-sdk-immutable
          path: ${{ runner.temp }}/pylva-python-artifact/*
          if-no-files-found: error
          retention-days: 30

  python-package-matrix:
    name: Python SDK source + immutable artifact / Python ${{ matrix.python }}
    needs: python-package-artifact
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        python: ['3.10', '3.11', '3.12', '3.13']
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python }}
          cache: pip
          cache-dependency-path: packages/sdk-py/pyproject.toml

      - name: Download the one immutable Python artifact pair
        uses: actions/download-artifact@v8
        with:
          name: pylva-python-sdk-immutable
          path: ${{ runner.temp }}/pylva-python-download

      - name: Bind this matrix leg to the producer outputs
        env:
          EXPECTED_WHEEL: ${{ needs.python-package-artifact.outputs.wheel }}
          EXPECTED_WHEEL_SHA256: ${{ needs.python-package-artifact.outputs.wheel_sha256 }}
          EXPECTED_SDIST: ${{ needs.python-package-artifact.outputs.sdist }}
          EXPECTED_SDIST_SHA256: ${{ needs.python-package-artifact.outputs.sdist_sha256 }}
          EXPECTED_NAME: ${{ needs.python-package-artifact.outputs.name }}
          EXPECTED_VERSION: ${{ needs.python-package-artifact.outputs.version }}
          EXPECTED_SOURCE_SHA: ${{ needs.python-package-artifact.outputs.source_sha }}
        run: |
          set -euo pipefail
          ARTIFACT_DIR="$RUNNER_TEMP/pylva-python-download"
          python -c 'import json,os,sys; m=json.load(open(sys.argv[1])); assert m == {"name": os.environ["EXPECTED_NAME"], "version": os.environ["EXPECTED_VERSION"], "source_sha": os.environ["EXPECTED_SOURCE_SHA"], "wheel": os.environ["EXPECTED_WHEEL"], "wheel_sha256": os.environ["EXPECTED_WHEEL_SHA256"], "sdist": os.environ["EXPECTED_SDIST"], "sdist_sha256": os.environ["EXPECTED_SDIST_SHA256"]}' "$ARTIFACT_DIR/metadata.json"
          WHEEL="$ARTIFACT_DIR/$EXPECTED_WHEEL"
          SDIST="$ARTIFACT_DIR/$EXPECTED_SDIST"
          test "$(sha256sum "$WHEEL" | cut -d' ' -f1)" = "$EXPECTED_WHEEL_SHA256"
          test "$(sha256sum "$SDIST" | cut -d' ' -f1)" = "$EXPECTED_SDIST_SHA256"
          echo "PYLVA_PYTHON_WHEEL=$WHEEL" >> "$GITHUB_ENV"
          echo "PYLVA_PYTHON_WHEEL_SHA256=$EXPECTED_WHEEL_SHA256" >> "$GITHUB_ENV"
          echo "PYLVA_PYTHON_SDIST=$SDIST" >> "$GITHUB_ENV"
          echo "PYLVA_PYTHON_SDIST_SHA256=$EXPECTED_SDIST_SHA256" >> "$GITHUB_ENV"
          echo "PYLVA_PYTHON_ARTIFACT_VERSION=$EXPECTED_VERSION" >> "$GITHUB_ENV"

      - name: Install the immutable wheel and development-only test tools
        run: |
          set -euo pipefail
          python -m pip install --disable-pip-version-check "${PYLVA_PYTHON_WHEEL}[dev,langchain]"
          python -m pip check
          PYLVA_REPO_ROOT="$GITHUB_WORKSPACE" PYLVA_EXPECTED_VERSION="$PYLVA_PYTHON_ARTIFACT_VERSION" \
            PYTHONPATH='' python -I - <<'PY'
          import importlib.metadata
          import os
          import pathlib
          import pylva

          installed = pathlib.Path(pylva.__file__ or "").resolve()
          repository = pathlib.Path(os.environ["PYLVA_REPO_ROOT"]).resolve()
          assert repository not in installed.parents, installed
          assert importlib.metadata.version("pylva-sdk") == os.environ["PYLVA_EXPECTED_VERSION"]
          print(f"immutable matrix install: {installed} pylva-sdk@{pylva.__version__}")
          PY

      - name: Test Python SDK
        env:
          PYTHONPATH: ''
        run: python -m pytest --import-mode=importlib packages/sdk-py/tests

      - name: Ruff
        if: matrix.python == '3.13'
        run: python -m ruff check packages/sdk-py/pylva packages/sdk-py/tests scripts/ci/smoke-python-package.py

      - name: Mypy
        if: matrix.python == '3.13'
        run: python -m mypy packages/sdk-py/pylva

      - name: Verify the exact immutable Python artifact pair
        run: |
          set -euo pipefail
          python scripts/ci/smoke-python-package.py --verify-existing \
            --wheel "$PYLVA_PYTHON_WHEEL" \
            --sdist "$PYLVA_PYTHON_SDIST" \
            --wheel-sha256 "$PYLVA_PYTHON_WHEEL_SHA256" \
            --sdist-sha256 "$PYLVA_PYTHON_SDIST_SHA256"

      - name: Re-verify the immutable Python matrix artifacts
        if: always()
        run: |
          set -euo pipefail
          test "$(sha256sum "$PYLVA_PYTHON_WHEEL" | cut -d' ' -f1)" = "$PYLVA_PYTHON_WHEEL_SHA256"
          test "$(sha256sum "$PYLVA_PYTHON_SDIST" | cut -d' ' -f1)" = "$PYLVA_PYTHON_SDIST_SHA256"

  python-pydantic-floor:
    name: Python SDK / Pydantic 2.5.0 floor
    needs: python-package-artifact
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v7
        with:
          python-version: '3.10'
          cache: pip
          cache-dependency-path: packages/sdk-py/pyproject.toml

      - name: Download the immutable Python artifact pair
        uses: actions/download-artifact@v8
        with:
          name: pylva-python-sdk-immutable
          path: ${{ runner.temp }}/pylva-python-floor

      - name: Install the immutable wheel at the declared Pydantic floor
        env:
          EXPECTED_WHEEL: ${{ needs.python-package-artifact.outputs.wheel }}
          EXPECTED_WHEEL_SHA256: ${{ needs.python-package-artifact.outputs.wheel_sha256 }}
          EXPECTED_VERSION: ${{ needs.python-package-artifact.outputs.version }}
        run: |
          set -euo pipefail
          WHEEL="$RUNNER_TEMP/pylva-python-floor/$EXPECTED_WHEEL"
          test "$(sha256sum "$WHEEL" | cut -d' ' -f1)" = "$EXPECTED_WHEEL_SHA256"
          python -m pip install --disable-pip-version-check "${WHEEL}[dev]"
          python -m pip install --disable-pip-version-check 'pydantic==2.5.0'
          python -m pip check
          PYLVA_REPO_ROOT="$GITHUB_WORKSPACE" PYLVA_EXPECTED_VERSION="$EXPECTED_VERSION" \
            PYTHONPATH='' python -I - <<'PY'
          import importlib.metadata
          import os
          import pathlib
          import pylva

          installed = pathlib.Path(pylva.__file__ or "").resolve()
          repository = pathlib.Path(os.environ["PYLVA_REPO_ROOT"]).resolve()
          assert repository not in installed.parents, installed
          assert importlib.metadata.version("pylva-sdk") == os.environ["PYLVA_EXPECTED_VERSION"]
          print(f"immutable Pydantic-floor install: {installed} pylva-sdk@{pylva.__version__}")
          PY

      - name: Run contract, client, and ownership at the floor
        env:
          PYTHONPATH: ''
        run: >-
          python -m pytest
          --import-mode=importlib
          packages/sdk-py/tests/test_budget_control_contract.py
          packages/sdk-py/tests/test_control_client.py
          packages/sdk-py/tests/test_control_ownership.py
          packages/sdk-py/tests/test_controlled_llm_wrappers.py
          packages/sdk-py/tests/test_controlled_usage.py
          packages/sdk-py/tests/test_non_llm_policy.py
          packages/sdk-py/tests/test_smoke.py

      - name: Re-verify the immutable Pydantic-floor artifact
        if: always()
        env:
          EXPECTED_WHEEL: ${{ needs.python-package-artifact.outputs.wheel }}
          EXPECTED_WHEEL_SHA256: ${{ needs.python-package-artifact.outputs.wheel_sha256 }}
          EXPECTED_SDIST: ${{ needs.python-package-artifact.outputs.sdist }}
          EXPECTED_SDIST_SHA256: ${{ needs.python-package-artifact.outputs.sdist_sha256 }}
        run: |
          set -euo pipefail
          test "$(sha256sum "$RUNNER_TEMP/pylva-python-floor/$EXPECTED_WHEEL" | cut -d' ' -f1)" = "$EXPECTED_WHEEL_SHA256"
          test "$(sha256sum "$RUNNER_TEMP/pylva-python-floor/$EXPECTED_SDIST" | cut -d' ' -f1)" = "$EXPECTED_SDIST_SHA256"

  authoritative-integration:
    name: Authoritative integration / ${{ matrix.suite }} / PostgreSQL ${{ matrix.postgres }} / ClickHouse ${{ matrix.clickhouse }}
    needs: [typescript-package-artifact, python-package-artifact]
    if: >-
      github.event_name != 'pull_request' ||
      contains(github.event.pull_request.labels.*.name, 'authoritative-control-full')
    runs-on: ubuntu-latest
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        include:
          - suite: postgresql
            postgres: '16'
            clickhouse: '24.8'
          - suite: postgresql
            postgres: '17'
            clickhouse: '24.8'
          - suite: concurrency-chaos
            postgres: '16'
            clickhouse: '24.8'
          - suite: projection-clickhouse
            postgres: '16'
            clickhouse: '24.8'
          - suite: projection-clickhouse
            postgres: '16'
            clickhouse: '26.5'
          - suite: langgraph
            postgres: '16'
            clickhouse: '24.8'
    services:
      postgres:
        image: postgres:${{ matrix.postgres }}
        env:
          POSTGRES_DB: pylva_test
          POSTGRES_USER: pylva
          POSTGRES_PASSWORD: pylva_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pylva -d pylva_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      clickhouse:
        image: clickhouse/clickhouse-server:${{ matrix.clickhouse }}
        env:
          CLICKHOUSE_USER: default
          CLICKHOUSE_PASSWORD: test
          CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
        ports:
          - 8123:8123
        options: >-
          --health-cmd "clickhouse-client --password test --query 'SELECT 1'"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@v7
        with:
          node-version: 20.19.0
          cache: pnpm

      - uses: actions/setup-python@v7
        if: matrix.suite == 'concurrency-chaos' || matrix.suite == 'langgraph'
        with:
          python-version: '3.13'

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Download the immutable TypeScript artifact for final service gates
        if: matrix.suite == 'concurrency-chaos' || matrix.suite == 'langgraph'
        uses: actions/download-artifact@v8
        with:
          name: pylva-typescript-sdk-immutable
          path: ${{ runner.temp }}/pylva-typescript-service-download

      - name: Download the immutable Python artifacts for final service gates
        if: matrix.suite == 'concurrency-chaos' || matrix.suite == 'langgraph'
        uses: actions/download-artifact@v8
        with:
          name: pylva-python-sdk-immutable
          path: ${{ runner.temp }}/pylva-python-service-download

      - name: Verify the exact Python artifact identity for final service gates
        if: matrix.suite == 'concurrency-chaos' || matrix.suite == 'langgraph'
        env:
          EXPECTED_WHEEL: ${{ needs.python-package-artifact.outputs.wheel }}
          EXPECTED_WHEEL_SHA256: ${{ needs.python-package-artifact.outputs.wheel_sha256 }}
          EXPECTED_SDIST: ${{ needs.python-package-artifact.outputs.sdist }}
          EXPECTED_SDIST_SHA256: ${{ needs.python-package-artifact.outputs.sdist_sha256 }}
          EXPECTED_NAME: ${{ needs.python-package-artifact.outputs.name }}
          EXPECTED_VERSION: ${{ needs.python-package-artifact.outputs.version }}
          EXPECTED_SOURCE_SHA: ${{ needs.python-package-artifact.outputs.source_sha }}
        run: |
          set -euo pipefail
          ARTIFACT_DIR="$RUNNER_TEMP/pylva-python-service-download"
          test "$(find "$ARTIFACT_DIR" -type f -name '*.whl' | wc -l)" -eq 1
          test "$(find "$ARTIFACT_DIR" -type f -name '*.tar.gz' | wc -l)" -eq 1
          WHEEL="$(python -c 'import json,pathlib,sys; p=pathlib.Path(sys.argv[1]); print(p.parent / json.loads(p.read_text())["wheel"])' "$ARTIFACT_DIR/metadata.json")"
          SDIST="$(python -c 'import json,pathlib,sys; p=pathlib.Path(sys.argv[1]); print(p.parent / json.loads(p.read_text())["sdist"])' "$ARTIFACT_DIR/metadata.json")"
          python -c 'import json,os,sys; m=json.load(open(sys.argv[1])); assert m == {"name": os.environ["EXPECTED_NAME"], "version": os.environ["EXPECTED_VERSION"], "source_sha": os.environ["EXPECTED_SOURCE_SHA"], "wheel": os.environ["EXPECTED_WHEEL"], "wheel_sha256": os.environ["EXPECTED_WHEEL_SHA256"], "sdist": os.environ["EXPECTED_SDIST"], "sdist_sha256": os.environ["EXPECTED_SDIST_SHA256"]}' "$ARTIFACT_DIR/metadata.json"
          test "$(basename "$WHEEL")" = "$EXPECTED_WHEEL"
          test "$(basename "$SDIST")" = "$EXPECTED_SDIST"
          test "$(sha256sum "$WHEEL" | cut -d' ' -f1)" = "$EXPECTED_WHEEL_SHA256"
          test "$(sha256sum "$SDIST" | cut -d' ' -f1)" = "$EXPECTED_SDIST_SHA256"
          echo "PYLVA_PYTHON_WHEEL=$WHEEL" >> "$GITHUB_ENV"
          echo "PYLVA_PYTHON_WHEEL_SHA256=$EXPECTED_WHEEL_SHA256" >> "$GITHUB_ENV"
          echo "PYLVA_PYTHON_SDIST=$SDIST" >> "$GITHUB_ENV"
          echo "PYLVA_PYTHON_SDIST_SHA256=$EXPECTED_SDIST_SHA256" >> "$GITHUB_ENV"
          echo "PYLVA_PYTHON_ARTIFACT_VERSION=$EXPECTED_VERSION" >> "$GITHUB_ENV"
          echo "PYLVA_PYTHON_ARTIFACT_SOURCE_SHA=$EXPECTED_SOURCE_SHA" >> "$GITHUB_ENV"

      - name: Verify and isolate the exact TypeScript artifact for final service gates
        if: matrix.suite == 'concurrency-chaos' || matrix.suite == 'langgraph'
        run: |
          set -euo pipefail
          DOWNLOAD="$RUNNER_TEMP/pylva-typescript-service-download"
          METADATA="$DOWNLOAD/metadata.json"
          mapfile -t TARBALLS < <(find "$DOWNLOAD" -type f -name '*.tgz' -print)
          test "${#TARBALLS[@]}" -eq 1
          TARBALL="$(node -e "const p=require('node:path'),m=require(process.argv[1]);process.stdout.write(p.resolve(p.dirname(process.argv[1]),m.tarball))" "$METADATA")"
          test "$(realpath "${TARBALLS[0]}")" = "$(realpath "$TARBALL")"
          SHA256="$(node -e "const m=require(process.argv[1]);process.stdout.write(m.sha256)" "$METADATA")"
          node scripts/ci/smoke-typescript-package.mjs \
            --tarball "$TARBALL" \
            --expected-sha256 "$SHA256" \
            --artifact-only
          INSTALL_ROOT="$RUNNER_TEMP/pylva-typescript-service-install"
          node scripts/ci/install-typescript-integration-artifact.mjs \
            --tarball "$TARBALL" \
            --expected-sha256 "$SHA256" \
            --install-root "$INSTALL_ROOT" \
            --peer-set scripts/ci/typescript-package-peers-current.json \
            --attestation-output "$INSTALL_ROOT/artifact-attestation.json"
          echo "PYLVA_TYPESCRIPT_ARTIFACT_MODE=immutable" >> "$GITHUB_ENV"
          echo "PYLVA_TYPESCRIPT_INSTALL_ROOT=$INSTALL_ROOT" >> "$GITHUB_ENV"
          echo "PYLVA_TYPESCRIPT_TARBALL=$TARBALL" >> "$GITHUB_ENV"
          echo "PYLVA_TYPESCRIPT_TARBALL_SHA256=$SHA256" >> "$GITHUB_ENV"

      - name: Bootstrap isolated non-superuser migration principal
        env:
          CI_POSTGRES_ADMIN_URL: postgresql://pylva:pylva_test@localhost:5432/pylva_test
          MIGRATION_DATABASE_URL: postgresql://pylva_migration_ci:pylva_migration_ci_test@localhost:5432/pylva_test
        run: pnpm exec tsx scripts/ci/bootstrap-authoritative-budget-migration-role.ts

      - name: Validate privileged migrations before the main database owns runtime ACLs
        if: matrix.suite == 'postgresql'
        env:
          DATABASE_URL: postgresql://pylva_migration_ci:pylva_migration_ci_test@localhost:5432/pylva_test
          PYLVA_TEST_DATABASE_ADMIN_URL: postgresql://pylva_migration_ci:pylva_migration_ci_test@localhost:5432/postgres
        run: |
          pnpm exec vitest run --config vitest.integration.config.ts \
            tests/integration/migration-runner.test.ts
          pnpm exec vitest run --config vitest.integration.config.ts \
            tests/integration/authoritative-budget-control-runtime-roles-migration.test.ts

      - name: Apply PostgreSQL and ClickHouse migrations
        env:
          MIGRATION_DATABASE_URL: postgresql://pylva_migration_ci:pylva_migration_ci_test@localhost:5432/pylva_test
          ALLOW_MIGRATION_DATABASE_URL_FALLBACK: 'true'
        run: pnpm db:setup

      - name: Provision ordinary general-app runtime login
        env:
          MIGRATION_DATABASE_URL: postgresql://pylva_migration_ci:pylva_migration_ci_test@localhost:5432/pylva_test
          GENERAL_APP_DATABASE_URL: postgresql://pylva_app_ci:pylva_app_ci_test@localhost:5432/pylva_test
        run: pnpm exec tsx scripts/ci/provision-general-app-runtime.ts

      - name: Provision isolated authoritative PostgreSQL runtime login
        env:
          MIGRATION_DATABASE_URL: postgresql://pylva_migration_ci:pylva_migration_ci_test@localhost:5432/pylva_test
        run: pnpm exec tsx scripts/ci/provision-authoritative-budget-runtime.ts

      - name: Verify ClickHouse availability
        run: pnpm clickhouse:doctor

      - name: Verify authoritative physical schema
        if: matrix.suite == 'postgresql'
        env:
          MIGRATION_DATABASE_URL: postgresql://pylva_migration_ci:pylva_migration_ci_test@localhost:5432/pylva_test
          ALLOW_MIGRATION_DATABASE_URL_FALLBACK: 'true'
        run: >-
          pnpm db:migrate:verify-physical --
          --contract authoritative_budget_ledger

      - name: Attest the exact production PostgreSQL runtime posture
        if: matrix.suite == 'postgresql'
        env:
          NODE_ENV: production
          ENABLE_AUTHORITATIVE_BUDGET_CONTROL: 'true'
          MIGRATION_DATABASE_URL: ''
          ALLOW_MIGRATION_DATABASE_URL_FALLBACK: ''
        run: pnpm exec tsx tests/fixtures/authoritative-budget-runtime-posture-runner.ts

      - name: Run PostgreSQL authority and exact-backfill suite
        if: matrix.suite == 'postgresql'
        env:
          PYLVA_TEST_DATABASE_ADMIN_URL: postgresql://pylva_migration_ci:pylva_migration_ci_test@localhost:5432/postgres
        run: >-
          pnpm exec vitest run --config vitest.integration.config.ts
          tests/integration/authoritative-budget-ledger-migration.test.ts
          tests/integration/authoritative-budget-runtime-migration.test.ts
          tests/integration/authoritative-budget-ledger-rls.test.ts
          tests/integration/authoritative-budget-accounts-readiness.test.ts
          tests/integration/authoritative-budget-rule-repository.test.ts
          tests/integration/authoritative-budget-pricing.test.ts
          tests/integration/authoritative-budget-tavily-pricing.test.ts
          tests/integration/authoritative-budget-reservation-service.test.ts
          tests/integration/authoritative-budget-exact-production.test.ts
          tests/integration/authoritative-budget-activity.test.ts
          tests/integration/authoritative-budget-activity-runtime-boundary.test.ts

      - name: Run ordinary general-app runtime boundary
        if: matrix.suite == 'postgresql'
        env:
          MIGRATION_DATABASE_URL: postgresql://pylva_migration_ci:pylva_migration_ci_test@localhost:5432/pylva_test
          GENERAL_APP_DATABASE_URL: postgresql://pylva_app_ci:pylva_app_ci_test@localhost:5432/pylva_test
        run: >-
          pnpm exec vitest run --config vitest.integration.config.ts
          tests/integration/general-app-runtime-owner-boundary.test.ts

      - name: Prove general-app provisioner atomicity and fail-closed drift handling
        if: matrix.suite == 'postgresql'
        env:
          CI_POSTGRES_ADMIN_URL: postgresql://pylva:pylva_test@localhost:5432/pylva_test
          MIGRATION_DATABASE_URL: postgresql://pylva_migration_ci:pylva_migration_ci_test@localhost:5432/pylva_test
          GENERAL_APP_DATABASE_URL: postgresql://pylva_app_ci:pylva_app_ci_test@localhost:5432/pylva_test
        run: >-
          pnpm exec vitest run --config vitest.integration.config.ts
          tests/integration/provision-general-app-runtime.test.ts

      - name: Prove budget-runtime provisioner atomicity and fail-closed ACL handling
        if: matrix.suite == 'postgresql'
        env:
          MIGRATION_DATABASE_URL: postgresql://pylva_migration_ci:pylva_migration_ci_test@localhost:5432/pylva_test
          GENERAL_APP_DATABASE_URL: postgresql://pylva_app_ci:pylva_app_ci_test@localhost:5432/pylva_test
        run: >-
          pnpm exec vitest run --config vitest.integration.config.ts
          tests/integration/provision-authoritative-budget-runtime.test.ts

      - name: Run concurrency, race, rollback, expiry, and load gates
        if: matrix.suite == 'concurrency-chaos'
        env:
          PYLVA_TEST_DATABASE_ADMIN_URL: postgresql://pylva_migration_ci:pylva_migration_ci_test@localhost:5432/postgres
        run: >-
          pnpm exec vitest run --config vitest.integration.config.ts
          tests/integration/authoritative-budget-transaction.test.ts
          tests/integration/authoritative-budget-lifecycle-service.test.ts
          tests/integration/authoritative-budget-first-use-load-gate.test.ts

      - name: Install immutable Python chaos artifact
        if: matrix.suite == 'concurrency-chaos'
        run: |
          set -euo pipefail
          python -m venv "$RUNNER_TEMP/pylva-chaos-venv"
          "$RUNNER_TEMP/pylva-chaos-venv/bin/python" -m pip install \
            --disable-pip-version-check "$PYLVA_PYTHON_WHEEL"
          "$RUNNER_TEMP/pylva-chaos-venv/bin/python" -m pip check
          PYLVA_REPO_ROOT="$GITHUB_WORKSPACE" PYLVA_EXPECTED_VERSION="$PYLVA_PYTHON_ARTIFACT_VERSION" \
            PYTHONPATH='' "$RUNNER_TEMP/pylva-chaos-venv/bin/python" -I - <<'PY'
          import importlib.metadata
          import os
          import pathlib
          import pylva

          installed = pathlib.Path(pylva.__file__ or "").resolve()
          repository = pathlib.Path(os.environ["PYLVA_REPO_ROOT"]).resolve()
          assert repository not in installed.parents, installed
          assert importlib.metadata.version("pylva-sdk") == os.environ["PYLVA_EXPECTED_VERSION"]
          print(f"immutable chaos install: {installed} pylva-sdk@{pylva.__version__}")
          PY
          test "$(sha256sum "$PYLVA_PYTHON_WHEEL" | cut -d' ' -f1)" = "$PYLVA_PYTHON_WHEEL_SHA256"

      - name: Run cross-runtime process chaos from immutable artifacts
        if: matrix.suite == 'concurrency-chaos'
        env:
          PYLVA_TEST_DATABASE_ADMIN_URL: postgresql://pylva_migration_ci:pylva_migration_ci_test@localhost:5432/postgres
          PYLVA_CHAOS_PYTHON: ${{ runner.temp }}/pylva-chaos-venv/bin/python
          PYLVA_CHAOS_PYTHONPATH: ''
        run: >-
          pnpm exec vitest run --config vitest.integration.config.ts
          tests/integration/authoritative-budget-chaos.test.ts

      - name: Run PostgreSQL/ClickHouse projection gates
        if: matrix.suite == 'projection-clickhouse'
        env:
          PYLVA_TEST_DATABASE_ADMIN_URL: postgresql://pylva_migration_ci:pylva_migration_ci_test@localhost:5432/postgres
        run: >-
          pnpm exec vitest run --config vitest.integration.config.ts
          tests/integration/authoritative-budget-projection-postgres.test.ts
          tests/integration/authoritative-budget-projection-clickhouse.test.ts
          tests/integration/authoritative-budget-projection-clickhouse-rbac.test.ts
          tests/integration/clickhouse-utc-timestamp.test.ts
          tests/integration/authoritative-budget-projection-outage-recovery.test.ts
          tests/integration/authoritative-dashboard-mixed-analytics.test.ts

      - name: Run projection worker and cron contracts
        if: matrix.suite == 'projection-clickhouse'
        run: >-
          pnpm exec vitest run
          tests/budget-projection
          tests/billing
          tests/clickhouse/canonical-cost-read-contract.test.ts
          tests/cron/project-budget-cost-events.test.ts

      - name: Install immutable Python LangGraph artifact
        if: matrix.suite == 'langgraph'
        run: |
          set -euo pipefail
          python -m venv "$RUNNER_TEMP/pylva-langgraph-venv"
          "$RUNNER_TEMP/pylva-langgraph-venv/bin/python" -m pip install \
            --disable-pip-version-check \
            "$PYLVA_PYTHON_WHEEL" \
            'langchain>=1,<2' \
            'langgraph>=1,<2' \
            'openai==2.45.0' \
            'respx==0.23.1'
          "$RUNNER_TEMP/pylva-langgraph-venv/bin/python" -m pip check
          PYLVA_REPO_ROOT="$GITHUB_WORKSPACE" PYLVA_EXPECTED_VERSION="$PYLVA_PYTHON_ARTIFACT_VERSION" \
            PYTHONPATH='' "$RUNNER_TEMP/pylva-langgraph-venv/bin/python" -I - <<'PY'
          import importlib.metadata
          import os
          import pathlib
          import pylva

          installed = pathlib.Path(pylva.__file__ or "").resolve()
          repository = pathlib.Path(os.environ["PYLVA_REPO_ROOT"]).resolve()
          assert repository not in installed.parents, installed
          assert importlib.metadata.version("pylva-sdk") == os.environ["PYLVA_EXPECTED_VERSION"]
          print(f"immutable LangGraph install: {installed} pylva-sdk@{pylva.__version__}")
          PY
          test "$(sha256sum "$PYLVA_PYTHON_WHEEL" | cut -d' ' -f1)" = "$PYLVA_PYTHON_WHEEL_SHA256"

      - name: Run LangGraph service journeys
        if: matrix.suite == 'langgraph'
        env:
          PYLVA_TEST_DATABASE_ADMIN_URL: postgresql://pylva_migration_ci:pylva_migration_ci_test@localhost:5432/postgres
          PYLVA_LANGGRAPH_PYTHON: ${{ runner.temp }}/pylva-langgraph-venv/bin/python
          PYTHONPATH: ''
        run: >-
          pnpm exec vitest run --config vitest.integration.config.ts
          tests/integration/langgraph-clickhouse-readiness.test.ts
          tests/integration/langgraph-sdk-customer-journey.test.ts
          tests/integration/langgraph-authoritative-sdk-e2e.test.ts

      - name: Run LangGraph SDK callbacks and non-LLM policy
        if: matrix.suite == 'langgraph'
        run: >-
          pnpm --filter @pylva/sdk exec vitest run
          tests/langgraph_callback.test.ts
          tests/langgraph_non_llm_policy.test.ts

      - name: Re-verify immutable service artifacts after use
        if: always() && (matrix.suite == 'concurrency-chaos' || matrix.suite == 'langgraph')
        run: |
          set -euo pipefail
          test "$(sha256sum "$PYLVA_PYTHON_WHEEL" | cut -d' ' -f1)" = "$PYLVA_PYTHON_WHEEL_SHA256"
          test "$(sha256sum "$PYLVA_PYTHON_SDIST" | cut -d' ' -f1)" = "$PYLVA_PYTHON_SDIST_SHA256"
          test "$(sha256sum "$PYLVA_TYPESCRIPT_TARBALL" | cut -d' ' -f1)" = "$PYLVA_TYPESCRIPT_TARBALL_SHA256"

  authoritative-dashboard-e2e:
    name: Authoritative budget dashboard journey
    if: >-
      github.event_name != 'pull_request' ||
      contains(github.event.pull_request.labels.*.name, 'authoritative-control-full')
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      E2E_DASHBOARD: 'true'
      SESSION_COOKIE_SECURE: 'false'
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: pylva_test
          POSTGRES_USER: pylva
          POSTGRES_PASSWORD: pylva_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pylva -d pylva_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      clickhouse:
        image: clickhouse/clickhouse-server:24.8
        env:
          CLICKHOUSE_USER: default
          CLICKHOUSE_PASSWORD: test
          CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
        ports:
          - 8123:8123
        options: >-
          --health-cmd "clickhouse-client --password test --query 'SELECT 1'"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@v7
        with:
          node-version: 20.19.0
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Bootstrap isolated non-superuser migration principal
        env:
          CI_POSTGRES_ADMIN_URL: postgresql://pylva:pylva_test@localhost:5432/pylva_test
          MIGRATION_DATABASE_URL: postgresql://pylva_migration_ci:pylva_migration_ci_test@localhost:5432/pylva_test
        run: pnpm exec tsx scripts/ci/bootstrap-authoritative-budget-migration-role.ts

      - name: Install Chromium and WebKit
        run: pnpm exec playwright install --with-deps chromium webkit

      - name: Generate throwaway dashboard JWT keys
        run: |
          node --input-type=module <<'NODE'
          import crypto from 'node:crypto';
          import fs from 'node:fs';

          const { privateKey, publicKey } = crypto.generateKeyPairSync('rsa', {
            modulusLength: 2048,
            publicKeyEncoding: { type: 'spki', format: 'pem' },
            privateKeyEncoding: { type: 'pkcs8', format: 'pem' },
          });
          fs.writeFileSync(process.env.JWT_PRIVATE_KEY, privateKey, { mode: 0o600 });
          fs.writeFileSync(process.env.JWT_PUBLIC_KEY, publicKey, { mode: 0o644 });
          NODE

      - name: Apply migrations
        env:
          MIGRATION_DATABASE_URL: postgresql://pylva_migration_ci:pylva_migration_ci_test@localhost:5432/pylva_test
          ALLOW_MIGRATION_DATABASE_URL_FALLBACK: 'true'
        run: pnpm db:setup

      - name: Provision ordinary general-app runtime login
        env:
          MIGRATION_DATABASE_URL: postgresql://pylva_migration_ci:pylva_migration_ci_test@localhost:5432/pylva_test
          GENERAL_APP_DATABASE_URL: postgresql://pylva_app_ci:pylva_app_ci_test@localhost:5432/pylva_test
        run: pnpm exec tsx scripts/ci/provision-general-app-runtime.ts

      - name: Provision isolated authoritative PostgreSQL runtime login
        env:
          MIGRATION_DATABASE_URL: postgresql://pylva_migration_ci:pylva_migration_ci_test@localhost:5432/pylva_test
        run: pnpm exec tsx scripts/ci/provision-authoritative-budget-runtime.ts

      - name: Verify ClickHouse and seed browser fixtures
        run: |
          pnpm clickhouse:doctor
          pnpm db:seed
          pnpm exec tsx tests/e2e/setup/seed-dashboard-fixtures.ts
          pnpm exec tsx tests/e2e/setup/seed-authoritative-budget-journey.ts

      - name: Run budget-activity route and read-model contracts
        run: >-
          pnpm exec vitest run
          tests/budget-activity
          tests/dashboard/budget-activity-route.test.ts

      - name: Run budget-activity component contracts
        run: >-
          pnpm exec vitest run --config vitest.frontend.config.ts
          tests/frontend/budget-activity.test.tsx
          tests/frontend/trace-budget-decoration.test.tsx

      - name: Build dashboard
        run: pnpm build

      - name: Start dashboard
        run: |
          pnpm exec next start -p 3000 > /tmp/pylva-authoritative-next.log 2>&1 &
          for attempt in {1..30}; do
            if curl --max-time 5 --fail --silent --show-error http://localhost:3000/login >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          cat /tmp/pylva-authoritative-next.log
          exit 1

      - name: Run authoritative budget-activity browser journey
        run: pnpm exec playwright test tests/e2e/budget-activity.spec.ts

      - name: Upload browser diagnostics
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: authoritative-dashboard-browser-diagnostics
          path: |
            playwright-report/
            test-results/
            /tmp/pylva-authoritative-next.log
          if-no-files-found: ignore

  authoritative-control-full-gate:
    name: Authoritative control full gate
    if: always()
    needs:
      - contract-parity
      - typescript-package-matrix
      - python-package-artifact
      - python-package-matrix
      - python-pydantic-floor
      - authoritative-integration
      - authoritative-dashboard-e2e
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Require full-control label before merge
        if: >-
          github.event_name == 'pull_request' &&
          !contains(github.event.pull_request.labels.*.name, 'authoritative-control-full')
        run: |
          echo "Add the authoritative-control-full label to run the full service and browser gates before merge."
          exit 1

      - name: Require every focused gate to pass
        env:
          CONTRACT_RESULT: ${{ needs.contract-parity.result }}
          TYPESCRIPT_RESULT: ${{ needs.typescript-package-matrix.result }}
          PYTHON_ARTIFACT_RESULT: ${{ needs.python-package-artifact.result }}
          PYTHON_RESULT: ${{ needs.python-package-matrix.result }}
          PYDANTIC_FLOOR_RESULT: ${{ needs.python-pydantic-floor.result }}
          INTEGRATION_RESULT: ${{ needs.authoritative-integration.result }}
          DASHBOARD_RESULT: ${{ needs.authoritative-dashboard-e2e.result }}
        run: |
          for result in \
            "$CONTRACT_RESULT" \
            "$TYPESCRIPT_RESULT" \
            "$PYTHON_ARTIFACT_RESULT" \
            "$PYTHON_RESULT" \
            "$PYDANTIC_FLOOR_RESULT" \
            "$INTEGRATION_RESULT" \
            "$DASHBOARD_RESULT"; do
            if [ "$result" != "success" ]; then
              echo "A required authoritative-control job ended as: $result"
              exit 1
            fi
          done
