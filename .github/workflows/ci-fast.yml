name: CI Required

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

env:
  DATABASE_URL: postgresql://pylva:pylva_test@localhost:5432/pylva_test
  CLICKHOUSE_URL: http://localhost:8123
  REDIS_URL: redis://localhost:6379
  JWT_PRIVATE_KEY: /tmp/pylva-ci-private.pem
  JWT_PUBLIC_KEY: /tmp/pylva-ci-public.pem
  ARGON2_SECRET: ci-test-secret-must-be-32-bytes-long!!

jobs:
  ci-static:
    name: ci-static
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: License map check
        run: pnpm license:check

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

  ci-unit-js:
    name: ci-unit-js
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Unit Tests (excluding security/integration/e2e)
        run: pnpm test -- --exclude '**/security/**'

      - name: Authoritative budget-control middleware boundary
        run: pnpm exec vitest run tests/security/middleware-budget-control-auth.test.ts

      - name: Frontend component tests
        run: pnpm test:frontend

  ci-egress-runtime:
    name: ci-egress-runtime-node-${{ matrix.node }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['20.18.1', '22']
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Real-socket external egress integration
        run: pnpm exec vitest run --config vitest.integration.config.ts tests/integration/external-egress-transport.test.ts

  ci-sdk-py:
    name: ci-sdk-py
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Python SDK dev deps
        run: python -m pip install -e 'packages/sdk-py[dev]'

      - name: Python ruff
        run: ruff check packages/sdk-py/pylva packages/sdk-py/tests

      - name: Python mypy
        run: mypy packages/sdk-py/pylva

      - name: Python pytest
        run: pytest packages/sdk-py/tests

      - name: Budget-control contract at Pydantic floor
        run: |
          python -m pip install --force-reinstall 'pydantic==2.5.0'
          PYTHONPATH=packages/sdk-py python -m pytest packages/sdk-py/tests/test_budget_control_contract.py

  ci-build-smoke:
    name: ci-build-smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Build smoke
        run: pnpm build

      - name: Performance budget
        run: pnpm perf:budget
