name: CI Integration

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review, labeled]
  push:
    branches: [main]
  schedule:
    - cron: '23 2 * * *'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

env:
  ARGON2_SECRET: ci-test-secret-must-be-32-bytes-long!!
  JWT_PRIVATE_KEY: /tmp/pylva-ci-private.pem
  JWT_PUBLIC_KEY: /tmp/pylva-ci-public.pem
  STRIPE_WEBHOOK_SECRET: whsec_test_connect
  CRON_SECRET: '12345678901234567890123456789012'

jobs:
  ci-external-egress-live:
    name: ci-external-egress-live
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      DATABASE_URL: postgresql://pylva:pylva@localhost:5432/pylva
      CLICKHOUSE_URL: http://localhost:8123
      REDIS_URL: redis://localhost:6379
      JWT_PRIVATE_KEY: /tmp/pylva-ci-private.pem
      JWT_PUBLIC_KEY: /tmp/pylva-ci-public.pem
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@v7
        with:
          node-version: 20.19.0
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Check live GitHub and Google OAuth egress
        run: pnpm check:external-egress

  ci-db-security:
    name: ci-db-security
    if: github.event_name == 'pull_request' || github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: pylva_test
          POSTGRES_USER: pylva
          POSTGRES_PASSWORD: pylva_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pylva"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      clickhouse:
        image: clickhouse/clickhouse-server:24.8
        env:
          CLICKHOUSE_USER: default
          CLICKHOUSE_PASSWORD: test
          CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
        ports:
          - 8123:8123
        options: >-
          --health-cmd "clickhouse-client --password test --query 'SELECT 1'"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://pylva_app_ci:pylva_app_ci_test@localhost:5432/pylva_test
      BUDGET_CONTROL_DATABASE_URL: postgresql://pylva_budget_control_ci:pylva_budget_control_ci_test@localhost:5432/pylva_test
      PYLVA_RLS_TEST_DATABASE_URL: postgresql://pylva_rls_test:pylva_rls_test@localhost:5432/pylva_test
      ALLOW_BUDGET_CONTROL_DATABASE_URL_FALLBACK: 'false'
      CLICKHOUSE_URL: http://default:test@localhost:8123
      REDIS_URL: redis://localhost:6379

    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Bootstrap isolated non-superuser migration principal
        env:
          CI_POSTGRES_ADMIN_URL: postgresql://pylva:pylva_test@localhost:5432/pylva_test
          MIGRATION_DATABASE_URL: postgresql://pylva_migration_ci:pylva_migration_ci_test@localhost:5432/pylva_test
        run: pnpm exec tsx scripts/ci/bootstrap-authoritative-budget-migration-role.ts

      - name: Run migrations
        env:
          MIGRATION_DATABASE_URL: postgresql://pylva_migration_ci:pylva_migration_ci_test@localhost:5432/pylva_test
        run: pnpm db:setup

      - name: Provision ordinary general-app runtime login
        env:
          MIGRATION_DATABASE_URL: postgresql://pylva_migration_ci:pylva_migration_ci_test@localhost:5432/pylva_test
          GENERAL_APP_DATABASE_URL: postgresql://pylva_app_ci:pylva_app_ci_test@localhost:5432/pylva_test
        run: pnpm exec tsx scripts/ci/provision-general-app-runtime.ts

      - name: Provision dedicated budget-control runtime login
        env:
          MIGRATION_DATABASE_URL: postgresql://pylva_migration_ci:pylva_migration_ci_test@localhost:5432/pylva_test
        run: pnpm exec tsx scripts/ci/provision-authoritative-budget-runtime.ts

      - name: Provision isolated database test identities
        env:
          CI_POSTGRES_ADMIN_URL: postgresql://pylva:pylva_test@localhost:5432/pylva_test
          PYLVA_TEST_DATABASE_URL: postgresql://pylva_fixture_ci:pylva_fixture_ci_test@localhost:5432/pylva_test
        run: pnpm exec tsx scripts/ci/provision-database-test-identities.ts

      - name: Verify ClickHouse readiness
        run: pnpm clickhouse:doctor

      - name: Seed test data
        run: pnpm db:seed

      - name: Prove the ordinary general-app runtime boundary
        env:
          MIGRATION_DATABASE_URL: postgresql://pylva_migration_ci:pylva_migration_ci_test@localhost:5432/pylva_test
          GENERAL_APP_DATABASE_URL: postgresql://pylva_app_ci:pylva_app_ci_test@localhost:5432/pylva_test
        run: >-
          pnpm exec vitest run --config vitest.integration.config.ts
          tests/integration/general-app-runtime-owner-boundary.test.ts

      - name: Legacy DB security and integration tests
        env:
          # Keep application code on the job-level ordinary runtime identity;
          # fixture ownership uses the isolated non-superuser migration identity,
          # and RLS assertions use the dedicated test-only identity.
          PYLVA_TEST_DATABASE_ADMIN_URL: postgresql://pylva_migration_ci:pylva_migration_ci_test@localhost:5432/postgres
          PYLVA_TEST_DATABASE_URL: postgresql://pylva_fixture_ci:pylva_fixture_ci_test@localhost:5432/pylva_test
        run: >-
          pnpm exec vitest run --config vitest.integration.config.ts
          --exclude 'tests/integration/authoritative-*.test.ts'
          --exclude 'tests/integration/langgraph-*.test.ts'
          --exclude 'tests/integration/migration-runner.test.ts'
          --exclude 'tests/integration/provision-authoritative-budget-runtime.test.ts'
          --exclude 'tests/integration/provision-general-app-runtime.test.ts'

      - name: Live ClickHouse suite (validates DDL on CI-pinned 24.8)
        run: pnpm exec vitest run tests/clickhouse
        env:
          CLICKHOUSE_LIVE_TESTS: 'true'

  ci-full-services:
    name: ci-full-services
    if: >-
      github.event_name == 'push' ||
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.pull_request.labels.*.name, 'full-integration') ||
      contains(github.event.pull_request.labels.*.name, 'authoritative-control-full')
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: pylva_test
          POSTGRES_USER: pylva
          POSTGRES_PASSWORD: pylva_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pylva"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      clickhouse:
        image: clickhouse/clickhouse-server:24.8
        env:
          CLICKHOUSE_USER: default
          CLICKHOUSE_PASSWORD: test
          CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
        ports:
          - 8123:8123
        options: >-
          --health-cmd "clickhouse-client --password test --query 'SELECT 1'"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://pylva_app_ci:pylva_app_ci_test@localhost:5432/pylva_test
      BUDGET_CONTROL_DATABASE_URL: postgresql://pylva_budget_control_ci:pylva_budget_control_ci_test@localhost:5432/pylva_test
      PYLVA_RLS_TEST_DATABASE_URL: postgresql://pylva_rls_test:pylva_rls_test@localhost:5432/pylva_test
      ALLOW_BUDGET_CONTROL_DATABASE_URL_FALLBACK: 'false'
      CLICKHOUSE_URL: http://default:test@localhost:8123
      REDIS_URL: redis://localhost:6379

    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Bootstrap isolated non-superuser migration principal
        env:
          CI_POSTGRES_ADMIN_URL: postgresql://pylva:pylva_test@localhost:5432/pylva_test
          MIGRATION_DATABASE_URL: postgresql://pylva_migration_ci:pylva_migration_ci_test@localhost:5432/pylva_test
        run: pnpm exec tsx scripts/ci/bootstrap-authoritative-budget-migration-role.ts

      - name: Run migrations
        env:
          MIGRATION_DATABASE_URL: postgresql://pylva_migration_ci:pylva_migration_ci_test@localhost:5432/pylva_test
        run: pnpm db:setup

      - name: Provision ordinary general-app runtime login
        env:
          MIGRATION_DATABASE_URL: postgresql://pylva_migration_ci:pylva_migration_ci_test@localhost:5432/pylva_test
          GENERAL_APP_DATABASE_URL: postgresql://pylva_app_ci:pylva_app_ci_test@localhost:5432/pylva_test
        run: pnpm exec tsx scripts/ci/provision-general-app-runtime.ts

      - name: Provision dedicated budget-control runtime login
        env:
          MIGRATION_DATABASE_URL: postgresql://pylva_migration_ci:pylva_migration_ci_test@localhost:5432/pylva_test
        run: pnpm exec tsx scripts/ci/provision-authoritative-budget-runtime.ts

      - name: Provision isolated database test identities
        env:
          CI_POSTGRES_ADMIN_URL: postgresql://pylva:pylva_test@localhost:5432/pylva_test
          PYLVA_TEST_DATABASE_URL: postgresql://pylva_fixture_ci:pylva_fixture_ci_test@localhost:5432/pylva_test
        run: pnpm exec tsx scripts/ci/provision-database-test-identities.ts

      - name: Verify ClickHouse readiness
        run: pnpm clickhouse:doctor

      - name: Seed test data
        run: pnpm db:seed

      - name: Prove the ordinary general-app runtime boundary
        env:
          MIGRATION_DATABASE_URL: postgresql://pylva_migration_ci:pylva_migration_ci_test@localhost:5432/pylva_test
          GENERAL_APP_DATABASE_URL: postgresql://pylva_app_ci:pylva_app_ci_test@localhost:5432/pylva_test
        run: >-
          pnpm exec vitest run --config vitest.integration.config.ts
          tests/integration/general-app-runtime-owner-boundary.test.ts

      - name: Prove general-app provisioner atomicity and fail-closed drift handling
        env:
          CI_POSTGRES_ADMIN_URL: postgresql://pylva:pylva_test@localhost:5432/pylva_test
          MIGRATION_DATABASE_URL: postgresql://pylva_migration_ci:pylva_migration_ci_test@localhost:5432/pylva_test
          GENERAL_APP_DATABASE_URL: postgresql://pylva_app_ci:pylva_app_ci_test@localhost:5432/pylva_test
        run: >-
          pnpm exec vitest run --config vitest.integration.config.ts
          tests/integration/provision-general-app-runtime.test.ts

      - name: Prove budget-runtime provisioner atomicity and fail-closed ACL handling
        env:
          MIGRATION_DATABASE_URL: postgresql://pylva_migration_ci:pylva_migration_ci_test@localhost:5432/pylva_test
          GENERAL_APP_DATABASE_URL: postgresql://pylva_app_ci:pylva_app_ci_test@localhost:5432/pylva_test
        run: >-
          pnpm exec vitest run --config vitest.integration.config.ts
          tests/integration/provision-authoritative-budget-runtime.test.ts

      - name: Full-service integration tests (immutable SDK gates delegated)
        env:
          # Keep application code on the job-level ordinary runtime identity;
          # fixture ownership uses the isolated non-superuser migration identity,
          # and RLS assertions use the dedicated test-only identity.
          PYLVA_TEST_DATABASE_ADMIN_URL: postgresql://pylva_migration_ci:pylva_migration_ci_test@localhost:5432/postgres
          PYLVA_TEST_DATABASE_URL: postgresql://pylva_fixture_ci:pylva_fixture_ci_test@localhost:5432/pylva_test
        run: >-
          pnpm exec vitest run --config vitest.integration.config.ts
          --exclude 'tests/integration/authoritative-budget-chaos.test.ts'
          --exclude 'tests/integration/authoritative-budget-control-runtime-roles-migration.test.ts'
          --exclude 'tests/integration/langgraph-authoritative-sdk-e2e.test.ts'
          --exclude 'tests/integration/migration-runner.test.ts'
          --exclude 'tests/integration/provision-authoritative-budget-runtime.test.ts'
          --exclude 'tests/integration/provision-general-app-runtime.test.ts'
