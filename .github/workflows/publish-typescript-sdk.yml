name: Publish TypeScript SDK

on:
  push:
    tags:
      - 'pylva-ts-v*'

permissions:
  actions: read
  contents: read
  id-token: write

jobs:
  publish-typescript:
    name: Publish @pylva/sdk
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Verify release tag is on main
        id: release_commit
        run: |
          git fetch --no-tags origin main:refs/remotes/origin/main
          TAG_COMMIT="$(git rev-parse "${GITHUB_SHA}^{commit}")"
          if ! git merge-base --is-ancestor "$TAG_COMMIT" origin/main; then
            echo "::error::Release tags must point at commits already merged to origin/main"
            exit 1
          fi
          echo "sha=$TAG_COMMIT" >> "$GITHUB_OUTPUT"

      - name: Require every release gate for the exact release commit
        id: release_gates
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_SHA: ${{ steps.release_commit.outputs.sha }}
        run: node scripts/ci/attest-release-sha.mjs

      - uses: actions/setup-node@v6
        with:
          node-version: '24.18.0'
          registry-url: 'https://registry.npmjs.org'

      - name: Verify trusted publishing runtime
        run: |
          node - <<'NODE'
          const [major, minor, patch] = process.versions.node.split('.').map(Number);
          if (major < 22 || (major === 22 && (minor < 14 || (minor === 14 && patch < 0)))) {
            throw new Error(`npm Trusted Publishing requires Node >=22.14.0, got ${process.version}`);
          }
          NODE
          npm --version | node -e '
            const version = require("node:fs").readFileSync(0, "utf8").trim();
            const [major, minor, patch] = version.split(".").map(Number);
            if (major < 11 || (major === 11 && (minor < 5 || (minor === 5 && patch < 1)))) {
              throw new Error(`npm Trusted Publishing requires npm >=11.5.1, got ${version}`);
            }
            console.log(`trusted publishing runtime ok: node ${process.version}, npm ${version}`);
          '

      - name: Verify release metadata
        id: release_metadata
        run: |
          node - <<'NODE'
          const fs = require('node:fs');
          const pkg = JSON.parse(fs.readFileSync('packages/sdk-ts/package.json', 'utf8'));
          const expectedTag = `pylva-ts-v${pkg.version}`;
          const semver = /^(?:0|[1-9]\d*)\.(?:0|[1-9]\d*)\.(?:0|[1-9]\d*)(?:-([0-9A-Za-z-]+(?:\.[0-9A-Za-z-]+)*))?(?:\+[0-9A-Za-z-]+(?:\.[0-9A-Za-z-]+)*)?$/u.exec(pkg.version);
          if (pkg.name !== '@pylva/sdk') {
            throw new Error(`unexpected package name: ${pkg.name}`);
          }
          if (semver === null) {
            throw new Error(`package version is not valid SemVer: ${pkg.version}`);
          }
          const prerelease = semver[1];
          if (
            prerelease !== undefined &&
            prerelease.split('.').some((identifier) => /^\d+$/u.test(identifier) && /^0\d+/u.test(identifier))
          ) {
            throw new Error(`package version has an invalid numeric prerelease identifier: ${pkg.version}`);
          }
          if (process.env.GITHUB_REF_NAME !== expectedTag) {
            throw new Error(`tag ${process.env.GITHUB_REF_NAME} does not match TypeScript SDK version ${pkg.version}`);
          }
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `dist_tag=${prerelease === undefined ? 'latest' : 'next'}\n`);
          NODE

      - name: Download the exact attested TypeScript release artifact
        uses: actions/download-artifact@v7
        with:
          name: pylva-typescript-sdk-immutable
          path: ${{ runner.temp }}/pylva-typescript-release
          github-token: ${{ github.token }}
          run-id: ${{ steps.release_gates.outputs.authoritative_run_id }}

      # Every verification below and the publish step consume the artifact
      # built by the exact-SHA authoritative workflow attested above.
      - name: Verify and fingerprint immutable release artifact
        env:
          EXPECTED_VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          ARTIFACT_DIR="$RUNNER_TEMP/pylva-typescript-release"
          METADATA="$ARTIFACT_DIR/metadata.json"
          test "$(find "$ARTIFACT_DIR" -maxdepth 1 -type f | wc -l)" -eq 2
          mapfile -t TARBALLS < <(find "$ARTIFACT_DIR" -type f -name '*.tgz' -print)
          test "${#TARBALLS[@]}" -eq 1
          node -e "const fs=require('node:fs'),m=require(process.argv[1]),p=require('./packages/sdk-ts/package.json');if(m.name!==p.name||m.version!==p.version)throw new Error('artifact metadata does not match release source metadata')" "$METADATA"
          TARBALL="$(node -e "const p=require('node:path'),m=require(process.argv[1]);process.stdout.write(p.resolve(p.dirname(process.argv[1]),m.tarball))" "$METADATA")"
          test "$(realpath "${TARBALLS[0]}")" = "$(realpath "$TARBALL")"
          SHA256="$(node -e "const m=require(process.argv[1]);process.stdout.write(m.sha256)" "$METADATA")"
          node scripts/ci/smoke-typescript-package.mjs \
            --tarball "$TARBALL" \
            --expected-sha256 "$SHA256" \
            --artifact-only
          echo "PYLVA_TYPESCRIPT_TARBALL=$TARBALL" >> "$GITHUB_ENV"
          echo "PYLVA_TYPESCRIPT_TARBALL_SHA256=$SHA256" >> "$GITHUB_ENV"

      - name: Verify optional-peer-free release artifact
        run: >-
          node scripts/ci/smoke-typescript-package.mjs
          --tarball "$PYLVA_TYPESCRIPT_TARBALL"
          --expected-sha256 "$PYLVA_TYPESCRIPT_TARBALL_SHA256"
          --optional-peer-free

      - name: Verify strict-supported peer floors from release artifact
        run: >-
          node scripts/ci/smoke-typescript-package.mjs
          --tarball "$PYLVA_TYPESCRIPT_TARBALL"
          --expected-sha256 "$PYLVA_TYPESCRIPT_TARBALL_SHA256"
          --peer-set scripts/ci/typescript-package-peers-floor.json
          --profile full

      - name: Verify repository-current peers from release artifact
        run: >-
          node scripts/ci/smoke-typescript-package.mjs
          --tarball "$PYLVA_TYPESCRIPT_TARBALL"
          --expected-sha256 "$PYLVA_TYPESCRIPT_TARBALL_SHA256"
          --peer-set scripts/ci/typescript-package-peers-current.json
          --profile full

      - name: Verify actual unsupported AI SDK majors from release artifact
        run: |
          set -euo pipefail
          for PEERS in \
            scripts/ci/typescript-package-peers-ai3.json \
            scripts/ci/typescript-package-peers-ai4.json \
            scripts/ci/typescript-package-peers-ai5.json
          do
            node scripts/ci/smoke-typescript-package.mjs \
              --tarball "$PYLVA_TYPESCRIPT_TARBALL" \
              --expected-sha256 "$PYLVA_TYPESCRIPT_TARBALL_SHA256" \
              --peer-set "$PEERS" \
              --profile vercel-refuse
          done

      # --ignore-scripts: prepublishOnly would re-run test+typecheck+build
      # (already explicit steps above) and the rebuild would replace dist
      # after the immutable tarball was audited. Publishing that tarball keeps
      # the built, hashed, installed, and published bytes identical.
      # prepublishOnly remains the safety belt for
      # manual publishes outside CI.
      # The @pylva/sdk npm package uses Trusted Publishing for this exact
      # GitHub Actions workflow. npm exchanges the job OIDC token for a
      # short-lived publish credential and records provenance automatically.
      - name: Publish exact verified artifact
        env:
          NPM_DIST_TAG: ${{ steps.release_metadata.outputs.dist_tag }}
        run: |
          set -euo pipefail
          ACTUAL_SHA256="$(node -e "const fs=require('node:fs'),c=require('node:crypto');process.stdout.write(c.createHash('sha256').update(fs.readFileSync(process.argv[1])).digest('hex'))" "$PYLVA_TYPESCRIPT_TARBALL")"
          test "$ACTUAL_SHA256" = "$PYLVA_TYPESCRIPT_TARBALL_SHA256"
          if [ "$NPM_DIST_TAG" = 'next' ]; then
            LATEST_BEFORE="$(npm view '@pylva/sdk' dist-tags.latest --json)"
          fi
          npm publish "$PYLVA_TYPESCRIPT_TARBALL" --access public --ignore-scripts --tag "$NPM_DIST_TAG"
          if [ "$NPM_DIST_TAG" = 'next' ]; then
            LATEST_AFTER="$(npm view '@pylva/sdk' dist-tags.latest --json)"
            test "$LATEST_AFTER" = "$LATEST_BEFORE"
          fi
