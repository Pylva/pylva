name: Self-Host Smoke

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  DATABASE_URL: postgresql://pylva_app_ci:pylva_app_ci_test@localhost:5432/pylva_test
  BUDGET_CONTROL_DATABASE_URL: postgresql://pylva_budget_control_ci:pylva_budget_control_ci_test@localhost:5432/pylva_test
  ALLOW_BUDGET_CONTROL_DATABASE_URL_FALLBACK: 'false'
  CLICKHOUSE_URL: http://default:test@localhost:8123
  BUDGET_PROJECTION_CLICKHOUSE_URL: http://default:test@localhost:8123
  ALLOW_BUDGET_PROJECTION_CLICKHOUSE_URL_FALLBACK: 'true'
  REDIS_URL: redis://localhost:6379
  JWT_PRIVATE_KEY: /tmp/pylva-ci-private.pem
  JWT_PUBLIC_KEY: /tmp/pylva-ci-public.pem
  ARGON2_SECRET: ci-test-secret-must-be-32-bytes-long!!
  PYLVA_BACKEND_URL: http://localhost:3000
  PUBLIC_SITE_URL: http://localhost:3000
  OAUTH_REDIRECT_BASE_URL: http://localhost:3000
  SESSION_COOKIE_SECURE: 'false'
  ENABLE_AUTHORITATIVE_BUDGET_CONTROL: 'false'
  NODE_ENV: test

jobs:
  self-host-smoke:
    name: self-host-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: pylva_test
          POSTGRES_USER: pylva
          POSTGRES_PASSWORD: pylva_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pylva"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      clickhouse:
        image: clickhouse/clickhouse-server:24.8
        env:
          CLICKHOUSE_USER: default
          CLICKHOUSE_PASSWORD: test
          CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
        ports:
          - 8123:8123
        options: >-
          --health-cmd "clickhouse-client --password test --query 'SELECT 1'"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Bootstrap isolated non-superuser migration principal
        env:
          CI_POSTGRES_ADMIN_URL: postgresql://pylva:pylva_test@localhost:5432/pylva_test
          MIGRATION_DATABASE_URL: postgresql://pylva_migration_ci:pylva_migration_ci_test@localhost:5432/pylva_test
        run: pnpm exec tsx scripts/ci/bootstrap-authoritative-budget-migration-role.ts

      - name: Generate JWT keypair
        run: |
          node --input-type=module <<'NODE'
          import crypto from 'node:crypto';
          import fs from 'node:fs';

          const { privateKey, publicKey } = crypto.generateKeyPairSync('rsa', {
            modulusLength: 2048,
            publicKeyEncoding: {
              type: 'spki',
              format: 'pem',
            },
            privateKeyEncoding: {
              type: 'pkcs8',
              format: 'pem',
            },
          });

          fs.writeFileSync(process.env.JWT_PRIVATE_KEY, privateKey, { mode: 0o600 });
          fs.writeFileSync(process.env.JWT_PUBLIC_KEY, publicKey, { mode: 0o644 });
          NODE

      - name: Run migrations
        env:
          MIGRATION_DATABASE_URL: postgresql://pylva_migration_ci:pylva_migration_ci_test@localhost:5432/pylva_test
        run: pnpm db:setup

      - name: Provision ordinary general-app runtime login
        env:
          MIGRATION_DATABASE_URL: postgresql://pylva_migration_ci:pylva_migration_ci_test@localhost:5432/pylva_test
          GENERAL_APP_DATABASE_URL: postgresql://pylva_app_ci:pylva_app_ci_test@localhost:5432/pylva_test
        run: pnpm exec tsx scripts/ci/provision-general-app-runtime.ts

      - name: Provision isolated authoritative PostgreSQL runtime login
        env:
          MIGRATION_DATABASE_URL: postgresql://pylva_migration_ci:pylva_migration_ci_test@localhost:5432/pylva_test
        run: pnpm exec tsx scripts/ci/provision-authoritative-budget-runtime.ts

      - name: Seed database
        run: pnpm db:seed

      - name: Build app
        run: pnpm build

      - name: Start production server
        run: |
          pnpm exec next start -p 3000 > /tmp/pylva-next.log 2>&1 &
          echo "$!" > /tmp/pylva-next.pid

      - name: Probe liveness and print health
        run: |
          set -euo pipefail

          code=""
          for attempt in {1..45}; do
            code="$(curl --max-time 5 -sS -o /tmp/pylva-livez.json -w "%{http_code}" http://localhost:3000/api/v1/livez || true)"
            if [ "$code" = "200" ]; then
              cat /tmp/pylva-livez.json
              echo
              break
            fi

            if ! kill -0 "$(cat /tmp/pylva-next.pid)" 2>/dev/null; then
              echo "Server exited before /api/v1/livez returned 200."
              cat /tmp/pylva-next.log
              exit 1
            fi

            sleep 2
          done

          if [ "$code" != "200" ]; then
            echo "/api/v1/livez did not return 200 within 90 seconds."
            cat /tmp/pylva-next.log
            exit 1
          fi

          echo "GET /api/v1/health:"
          curl --max-time 10 -sS -i http://localhost:3000/api/v1/health || true
          echo

      - name: Dump server log
        if: failure()
        run: cat /tmp/pylva-next.log || true
