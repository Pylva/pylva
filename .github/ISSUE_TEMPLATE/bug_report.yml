name: Bug report
description: Report a reproducible problem in Pylva.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the problem and its impact.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen instead?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      description: List the shortest steps that reproduce the issue.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: dropdown
    id: deployment
    attributes:
      label: Cloud or self-hosted?
      options:
        - Pylva Cloud
        - Self-hosted
        - Not sure
    validations:
      required: true
  - type: input
    id: sdk-version
    attributes:
      label: SDK and version
      description: Example: @pylva/sdk 1.0.0, pylva-sdk 1.0.2, or not using an SDK.
      placeholder: "@pylva/sdk 1.0.0"
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Logs or error output
      description: Paste relevant logs. Remove secrets, API keys, prompts, completions, and customer data.
      render: shell
    validations:
      required: false
