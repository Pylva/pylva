version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
      timezone: Asia/Riyadh
    open-pull-requests-limit: 5
    groups:
      npm-minor-patch:
        patterns:
          - '*'
        update-types:
          - minor
          - patch
    commit-message:
      prefix: 'chore(deps)'

  - package-ecosystem: pip
    directory: /packages/sdk-py
    schedule:
      interval: weekly
      day: monday
      time: '09:15'
      timezone: Asia/Riyadh
    open-pull-requests-limit: 5
    groups:
      python-minor-patch:
        patterns:
          - '*'
        update-types:
          - minor
          - patch
    commit-message:
      prefix: 'chore(deps)'

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '09:30'
      timezone: Asia/Riyadh
    open-pull-requests-limit: 5
    groups:
      actions-minor-patch:
        patterns:
          - '*'
        update-types:
          - minor
          - patch
    commit-message:
      prefix: 'chore(deps)'

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '09:45'
      timezone: Asia/Riyadh
    open-pull-requests-limit: 5
    groups:
      docker-minor-patch:
        patterns:
          - '*'
        update-types:
          - minor
          - patch
    commit-message:
      prefix: 'chore(deps)'

  - package-ecosystem: docker-compose
    directory: /docker
    schedule:
      interval: weekly
      day: monday
      time: '10:00'
      timezone: Asia/Riyadh
    open-pull-requests-limit: 5
    groups:
      compose-minor-patch:
        patterns:
          - '*'
        update-types:
          - minor
          - patch
    # PostgreSQL 18 changes the official image's data layout. A major upgrade
    # requires an explicit self-host data migration, not an image-only bump.
    ignore:
      - dependency-name: postgres
        update-types:
          - version-update:semver-major
    commit-message:
      prefix: 'chore(deps)'
