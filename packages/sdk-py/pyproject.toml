[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "pylva-sdk"
version = "1.1.0"
description = "Pylva SDK — cost infrastructure for AI agent businesses"
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.10"
authors = [{ name = "Pylva" }]
keywords = ["llm", "cost", "telemetry", "openai", "anthropic"]
classifiers = [
  "License :: OSI Approved :: MIT License",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
]
dependencies = [
  "httpx>=0.27",
  "pydantic>=2.5",
]

[project.optional-dependencies]
langchain = [
  "langchain>=1.0,<2.0",
  "langchain-core>=1.0,<2.0",
  "langgraph>=1.0,<2.0",
]
dev = [
  "pytest>=8",
  "pytest-asyncio>=0.23",
  "respx>=0.21",
  "ruff>=0.5",
  "mypy>=1.10",
  "tomli>=2; python_version < '3.11'",
]

[project.urls]
Homepage = "https://pylva.com"
Repository = "https://github.com/Pylva/pylva"

[tool.hatch.build.targets.wheel]
packages = ["pylva"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "N", "W"]
# Baseline (Track 0 PR 0.3): keep public-API exception names + SDK-mirroring
# class-style locals; long lines limited to a handful of signature/log strings.
ignore = ["N806", "N818", "E501"]

[tool.mypy]
python_version = "3.10"
strict = true
warn_return_any = true
warn_unused_configs = true
